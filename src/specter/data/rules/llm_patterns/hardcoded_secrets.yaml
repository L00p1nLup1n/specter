rules:
  - id: hardcoded-password-assignment
    patterns:
      - pattern: |
          password = "..."
      - pattern-not: |
          password = ""
      - pattern-not: |
          password = "..."  # nosec
    message: >
      Hardcoded password detected. Use environment variables or a secrets manager.
    languages: [python]
    severity: ERROR

  - id: hardcoded-secret-key
    patterns:
      - pattern: |
          secret_key = "..."
      - pattern-not: |
          secret_key = ""
    message: >
      Hardcoded secret key. Load from environment variables.
    languages: [python]
    severity: ERROR

  - id: hardcoded-api-key
    patterns:
      - pattern: |
          api_key = "..."
      - pattern-not: |
          api_key = ""
    message: >
      Hardcoded API key. Use environment variables instead.
    languages: [python]
    severity: ERROR

  - id: hardcoded-token
    patterns:
      - pattern: |
          token = "..."
      - pattern-not: |
          token = ""
    message: >
      Hardcoded token value detected.
    languages: [python]
    severity: WARNING
